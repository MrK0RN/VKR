<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Дифференциальная диагностика ХАТ{% endblock %}</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body class="theme-hashimoto">
  <header class="header">
    <div class="header-inner">
      <span class="header-badge" aria-hidden="true">ЩЖ</span>
      <div>
        <h1>Дифференциальная диагностика ХАТ</h1>
        <p class="subtitle">Хронический аутоиммунный тиреоидит — опросник по разделам</p>
      </div>
    </div>
  </header>
  <main class="container">
    {% block content %}{% endblock %}
  </main>
  <script src="/static/app.js"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
